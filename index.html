<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФэнтазиГрад — Цифровой Паспорт</title>
    <style>
        :root {
            --primary: #428f4d;
            --primary-dark: #2e6636;
            --accent: #ffca28;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --radius: 20px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 30px 20px 60px;
            text-align: center;
            position: relative;
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }

        /* PROFILE CARD */
        .profile-card {
            margin: -40px 20px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info h2 { margin: 0; font-size: 18px; }
        .user-level { 
            font-size: 12px; 
            background: #e8f5e9; 
            color: var(--primary); 
            padding: 4px 8px; 
            border-radius: 10px; 
            margin-top: 5px; 
            display: inline-block;
            font-weight: 600;
        }
        .points-display { text-align: right; }
        .points-value { font-size: 24px; font-weight: 700; color: var(--primary); }
        .points-label { font-size: 12px; color: var(--text-light); }

        /* PROGRESS BAR */
        .progress-container { margin: 0 20px 20px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: var(--text-light); }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }

        /* ACTIONS */
        .actions { padding: 0 20px 20px; }
        .action-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        .btn-action {
            width: 100%;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 12px;
            background: #fafafa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text);
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .btn-action:hover { border-color: var(--primary); color: var(--primary); background: #e8f5e9; }
        .btn-action:active { transform: scale(0.98); }

        /* REWARDS SECTION */
        .rewards { padding: 0 20px 30px; }
        .reward-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .reward-icon { font-size: 24px; }
        .reward-info h3 { margin: 0; font-size: 14px; }
        .reward-info p { margin: 2px 0 0; font-size: 12px; color: var(--text-light); }
        .btn-unlock {
            margin-left: auto;
            background: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .btn-unlock.active { cursor: pointer; opacity: 1; }

        /* MODAL (Certificate) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 320px;
            position: relative;
        }
        .cert-frame {
            border: 3px double var(--accent);
            padding: 20px;
            margin: 15px 0;
            background: #fffdf0;
        }
        .cert-title { font-family: 'Georgia', serif; font-size: 20px; color: var(--primary); }
        .cert-name { font-size: 16px; font-weight: bold; margin: 10px 0; border-bottom: 1px solid #ccc; display: inline-block; padding-bottom: 2px; }
        .btn-download {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        .btn-close {
            position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer;
        }

        /* ANIMATION */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.3s ease; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1> ФэнтазиГрад</h1>
        <p>Ваш цифровой паспорт жителя</p>
    </div>

    <!-- Profile Info -->
    <div class="profile-card">
        <div class="user-info">
            <h2 id="userName">Гость</h2>
            <span class="user-level" id="userLevel">Новичок</span>
        </div>
        <div class="points-display">
            <div class="points-value" id="points">0</div>
            <div class="points-label">баллов</div>
        </div>
    </div>

    <!-- Progress to Next Level -->
    <div class="progress-container">
        <div class="progress-label">
            <span>До уровня «Мастер»</span>
            <span id="progressText">0 / 100</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>
    </div>

    <!-- Actions (Simulating App Usage) -->
    <div class="actions">
        <div class="action-title">⚡ Получить баллы</div>
        
        <button class="btn-action" onclick="earnPoints(20)">
            <span>📸</span> Сканировать QR в мастерской
        </button>
        
        <button class="btn-action" onclick="earnPoints(50)">
            <span>🎭</span> Пройти квест «Рыцарь»
        </button>

        <button class="btn-action" onclick="earnPoints(30)">
            <span></span> Прогресс «Пожарный»
        </button>
    </div>

    <!-- Rewards / Certificates -->
    <div class="rewards">
        <div class="action-title">🏆 Достижения</div>
        
        <div class="reward-card">
            <div class="reward-icon">📜</div>
            <div class="reward-info">
                <h3>Сертификат «Мастер»</h3>
                <p>Набери 100 баллов</p>
            </div>
            <button class="btn-unlock" id="btnUnlock1" onclick="showCertificate()">Получить</button>
        </div>
    </div>
</div>

<!-- Certificate Modal -->
<div class="modal" id="certModal">
    <div class="modal-content">
        <button class="btn-close" onclick="closeModal()">×</button>
        <div class="cert-frame">
            <div class="cert-title">ДИПЛОМ</div>
            <p style="font-size: 12px; margin: 5px 0;">Выдано жителям ФэнтазиГрад</p>
            <div class="cert-name" id="certUser">Имя Гостя</div>
            <p style="font-size: 14px;">Успешно завершил программу<br>и стал настоящим Мастером!</p>
            <div style="margin-top: 15px; font-size: 30px;">⭐⭐⭐</div>
        </div>
        <button class="btn-download" onclick="downloadCert()">💾 Скачать сертификат</button>
    </div>
</div>

<script>
    // --- LOGIC ---
    
    // State initialization (Load from LocalStorage or Default)
    let state = JSON.parse(localStorage.getItem('fantazigrad_user')) || {
        name: 'Гость',
        points: 0,
        level: 'Новичок',
        hasMasterCert: false
    };

    // DOM Elements
    const elPoints = document.getElementById('points');
    const elLevel = document.getElementById('userLevel');
    const elProgress = document.getElementById('progressBar');
    const elProgressText = document.getElementById('progressText');
    const elBtnUnlock = document.getElementById('btnUnlock1');
    const elCertUser = document.getElementById('certUser');

    // Init UI
    updateUI();

    // Function: Earn Points
    function earnPoints(amount) {
        state.points += amount;
        
        // Level Up Logic
        if (state.points >= 100 && state.level !== 'Мастер') {
            state.level = 'Мастер';
            // Confetti effect could go here
            alert("🎉 Поздравляем! Вы достигли уровня МАСТЕР!");
        } else if (state.points >= 50 && state.level === 'Новичок') {
            state.level = 'Ученик';
        }

        saveData();
        updateUI();
    }

    // Function: Update UI
    function updateUI() {
        elPoints.innerText = state.points;
        elLevel.innerText = state.level;
        
        // Progress Calculation (Target 100)
        let progress = (state.points / 100) * 100;
        if (progress > 100) progress = 100;
        
        elProgress.style.width = progress + '%';
        elProgressText.innerText = `${state.points} / 100`;

        // Unlock Button State
        if (state.points >= 100) {
            elBtnUnlock.classList.add('active');
            elBtnUnlock.style.cursor = 'pointer';
            elBtnUnlock.style.opacity = '1';
        } else {
            elBtnUnlock.classList.remove('active');
            elBtnUnlock.style.cursor = 'not-allowed';
            elBtnUnlock.style.opacity = '0.5';
        }
    }

    // Function: Show Certificate
    function showCertificate() {
        if (state.points < 100) return;
        
        document.getElementById('certModal').style.display = 'flex';
        elCertUser.innerText = prompt("Введите ваше имя для сертификата:", "Иван");
    }

    function closeModal() {
        document.getElementById('certModal').style.display = 'none';
    }

    function downloadCert() {
        alert("Эмуляция скачивания: Сертификат.pdf сохранен!");
        closeModal();
    }

    // Function: Save Data
    function saveData() {
        localStorage.setItem('fantazigrad_user', JSON.stringify(state));
    }

</script>

</body>
</html>
