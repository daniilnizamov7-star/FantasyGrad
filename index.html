<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Королевский Свиток</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #273025;
            --green-brand: #428f4d;
            --gold: #FDBA29;
            --gold-light: #ffe082;
            --text-white: #ffffff;
            --text-muted: #a1a1a1;
            --parchment: #f4e7c3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Manrope', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #3a4a38 0%, #1a221a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-white);
        }

        /* Floating particles background */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--gold) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        .header {
            margin-bottom: 20px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 0.2s;
        }
        .header h3 {
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* THE SCROLL (CARD) */
        .scroll-container {
            width: 100%;
            position: relative;
            transform-origin: top center;
            animation: unroll 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scaleY(0);
        }

        @keyframes unroll {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .scroll-card {
            background: linear-gradient(135deg, #2a382c 0%, #1e2b20 100%);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 0 30px rgba(253, 186, 41, 0.2), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            text-align: center;
            overflow: hidden;
        }

        /* Parchment texture overlay */
        .scroll-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23FDBA29' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.5;
            pointer-events: none;
        }

        /* Ribbon */
        .ribbon {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 15px;
            display: inline-block;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Profession Icon */
        .prof-icon {
            font-size: 48px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(253, 186, 41, 0.6));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .profession-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold-light);
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .student-name {
            font-size: 18px;
            color: var(--text-white);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .stars {
            color: var(--gold);
            font-size: 24px;
            margin-bottom: 25px;
            letter-spacing: 4px;
        }

        /* QR Section */
        .qr-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            border: 1px dashed var(--gold);
            margin-bottom: 15px;
        }

        .qr-placeholder {
            width: 80px;
            height: 80px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        
        /* SVG QR Code Simulation */
        .qr-svg path { fill: var(--bg-dark); }

        .qr-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Signature */
        .signature {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            color: var(--gold);
            font-size: 16px;
            opacity: 0.8;
        }

        /* LEVEL PROGRESS */
        .level-container {
            width: 100%;
            margin-top: 25px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(253, 186, 41, 0.3);
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 0.8s;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #3a4a38;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--green-brand), var(--gold));
            border-radius: 3px;
            animation: fillBar 1.5s ease forwards 1s;
            box-shadow: 0 0 10px var(--gold);
        }

        @keyframes fillBar {
            0% { width: 0%; }
            100% { width: 65%; }
        }

        /* BUTTONS */
        .actions {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 1.2s;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.95); }

        .btn-primary {
            background: linear-gradient(45deg, var(--green-brand), #5cb866);
            color: white;
            box-shadow: 0 4px 15px rgba(66, 143, 77, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        /* UTILS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="particles"></div>

    <div class="app-container">
        <div class="header">
            <h3>Достижение разблокировано!</h3>
        </div>

        <div class="scroll-container">
            <div class="scroll-card">
                <div class="ribbon">Официальный сертификат</div>
                
                <div class="prof-icon">🧑‍🚒</div>
                
                <div class="profession-name">Юный Пожарный</div>
                <div class="student-name">Алексей Смирнов</div>
                
                <div class="stars">⭐⭐⭐</div>

                <div class="qr-section">
                    <div class="qr-placeholder">
                        <!-- Simple SVG QR -->
                        <svg class="qr-svg" width="60" height="60" viewBox="0 0 100 100">
                            <rect x="10" y="10" width="30" height="30" />
                            <rect x="60" y="10" width="30" height="30" />
                            <rect x="10" y="60" width="30" height="30" />
                            <rect x="50" y="50" width="10" height="10" />
                            <rect x="70" y="70" width="20" height="20" />
                        </svg>
                    </div>
                    <div class="qr-label">Код подлинности: #FNT-8821</div>
                </div>

                <div class="signature">
                    Король ФэнтазиГрада Дариан II
                </div>
            </div>
        </div>

        <div class="level-container">
            <div class="level-header">
                <span>Уровень: Мастер</span>
                <span>65% до следующего</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary">
                <span>📤</span> Поделиться
            </button>
            <button class="btn btn-secondary">
                <span>📂</span> Коллекция
            </button>
        </div>
    </div>

</body>
</html>
